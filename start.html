<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Voxel Quest: The Gated Vault</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB;
            font-family: 'Courier New', monospace;
            color: white;
            user-select: none;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border: 4px solid #555;
            z-index: 10;
            min-width: 220px;
            box-shadow: 4px 4px 0 #000;
        }

        #map-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn {
            padding: 12px 20px;
            background: #4aa52e;
            border: 3px solid #fff;
            cursor: pointer;
            font-weight: bold;
            color: white;
            box-shadow: 3px 3px 0px #000;
        }

        #map-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 6px solid #444;
            padding: 20px;
            display: none;
            z-index: 200;
            text-align: center;
        }

        #map-canvas {
            background: #000;
            border: 3px solid #fff;
            image-rendering: pixelated;
            margin-bottom: 15px;
        }

        #math-ui {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border: 8px solid #4aa52e;
            padding: 30px;
            color: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 150;
            border-radius: 4px;
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.5);
        }

        #math-input {
            font-size: 32px;
            width: 140px;
            text-align: center;
            background: #eee;
            border: 4px solid #4aa52e;
            outline: none;
            margin-top: 10px;
        }

        #msg {
            position: absolute;
            bottom: 120px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            color: #ffff00;
            z-index: 50;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            border: 2px solid white;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            opacity: 0.5;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        #death-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(180, 0, 0, 0);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
            pointer-events: none;
            transition: background 2s ease;
            opacity: 0;
        }
        #death-text {
            color: #fff; font-size: 48px; font-weight: bold;
            text-shadow: 4px 4px 0 #000;
            transform: scale(0.5);
            transition: all 2.5s ease;
        }

        /* BRYCECRAFT LANDING PAGE */
        #landing-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://www.transparenttextures.com/patterns/p6.png'), #4a7d3c;
            background-size: 100px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2000;
            text-align: center;
        }

        #title-container {
            position: relative;
            margin-bottom: 50px;
        }

        #main-title {
            font-size: 110px;
            color: #fff;
            text-shadow: 8px 8px 0 #3b3b3b;
            font-family: 'Courier New', monospace;
            letter-spacing: -5px;
            font-weight: 900;
            margin: 0;
        }

        #splash {
            position: absolute;
            right: -60px; bottom: -10px;
            font-size: 24px;
            color: #ffff00;
            text-shadow: 2px 2px #000;
            transform: rotate(-20deg);
            animation: splashPulse 0.5s infinite alternate;
            font-weight: bold;
        }

        @keyframes splashPulse {
            from { transform: rotate(-20deg) scale(1); }
            to { transform: rotate(-20deg) scale(1.1); }
        }

        .mc-btn {
            width: 400px;
            padding: 15px;
            background: #666;
            border: 4px solid #000;
            border-top-color: #aaa;
            border-left-color: #aaa;
            color: #e0e0e0;
            font-size: 24px;
            cursor: pointer;
            text-shadow: 2px 2px #000;
            margin-bottom: 10px;
            transition: all 0.1s;
        }

        .mc-btn:hover {
            background: #7a7a7a;
            color: #ffffdd;
            border: 4px solid #fff;
        }

        .mc-btn:active {
            padding-top: 17px;
            padding-bottom: 13px;
        }
    </style>
</head>

<body>

    <div id="landing-page">
        <div id="title-container">
            <h1 id="main-title">BRYCECRAFT</h1>
            <div id="splash">3D MATH QUEST!</div>
        </div>
        <button class="mc-btn" onclick="startGame()">START GAME</button>
        <button class="mc-btn" onclick="alert('Controls: WASD to Move, Space to Grab, B for Bomb!')">HOW TO PLAY</button>
        <p style="margin-top:20px; color:#aaa; font-style:italic">v1.2 - Voxel Engine Alpha</p>
    </div>

    <div id="hud">
        <div style="color: #00ffcc; font-weight: bold; margin-bottom:5px;">LEVEL <span id="lvl-val">1</span></div>
        <div class="stat-row" style="color:#ffd700"><span>GOLD:</span> <span id="gold-val">0</span></div>
        <div class="stat-row" style="color:#ff4444"><span>LIVES:</span> <span id="lives-val">3</span></div>
        <div class="stat-row" style="color:#ffaa00"><span>BOMBS:</span> <span id="bomb-val">0</span></div>
        <div style="font-size: 13px; margin-top:8px; border-top: 1px solid #444; padding-top:5px;">INV: <span
                id="keys-val">Empty</span></div>
    </div>

    <div id="map-container">
        <div class="btn" onclick="toggleMap()">MAZE MAP</div>
    </div>
    <div id="crosshair"></div>

    <div id="map-overlay">
        <h2 style="color:#fff; margin-top:0;">EXPLORED MAZE</h2>
        <canvas id="map-canvas" width="300" height="300"></canvas>
        <div><button class="btn" onclick="toggleMap()">RESUME</button></div>
    </div>

    <div id="math-ui">
        <div id="math-problem" style="font-size:32px; font-weight:bold;"></div>
        <input type="number" id="math-input" placeholder="?">
    </div>

    <div id="msg"></div>
    <div id="death-overlay">
        <div id="death-text">Wasted</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE STATE ---
        let gold = 0, lives = 3, bombs = 1, currentLevel = 1, inventory = [], isMathActive = false, lastHit = 0, isDead = false, startRotation = 0, boatMesh = null, boatAngle = 0;
        let boatState = 'patrol', ferrymanAngle = 0, boatRadius = 0, isPlayerOnBoat = false, atShore = null, lastDisembark = 0; 
        let isGameStarted = false;
        const GRID_SIZE = 17, CELL = 4, KEY_PRICE = 150, BOMB_PRICE = 75;
        let mazeData = [], explored = [], discoveredItems = [], collidables = [], interactables = [], entities = [], fingers = [], enemies = [], waterBounds = null;

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, dur, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }
        const sfx = {
            hurt: () => { playTone(150, 'sawtooth', 0.4, 0.2); playTone(100, 'sine', 0.4, 0.2); },
            buy: () => { playTone(600, 'sine', 0.1); setTimeout(() => playTone(900, 'sine', 0.2), 100); },
            win: () => { playTone(800, 'sine', 0.1); setTimeout(() => playTone(1200, 'sine', 0.3), 100); },
            fail: () => { playTone(200, 'square', 0.3, 0.15); },
            levelUp: () => { 
                [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.2), i * 150));
            }
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- THE HAND ---
        const handGroup = new THREE.Group();
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xdbac82 });
        const palm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.4), skinMat);
        handGroup.add(palm);
        for (let i = 0; i < 4; i++) {
            const f = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.3), skinMat);
            f.position.set(-0.18 + (i * 0.12), 0.05, -0.3);
            fingers.push(f); handGroup.add(f);
        }
        handGroup.position.set(0.6, -0.6, -1.2);
        handGroup.visible = false;
        camera.add(handGroup);
        scene.add(camera);

        // --- NPC & ENEMY BUILDERS ---
        function createHumanNPC(difficulty = 1) {
            const colors = [0x44ff44, 0xffff44, 0xff4444]; // Green, Yellow, Red
            const diffColor = colors[difficulty-1];
            const g = new THREE.Group();
            
            const skin = new THREE.MeshStandardMaterial({ color: 0xdbac82 });
            const shirtMat = new THREE.MeshStandardMaterial({ color: diffColor });
            const pantMat = new THREE.MeshStandardMaterial({ color: 0x303f9f }); // Classic blue pants
            
            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skin);
            head.position.y = 1.65;
            
            // Body/Torso
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.3), shirtMat);
            body.position.y = 1.05;
            
            // Arms
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), skin);
            lArm.position.set(-0.4, 1.05, 0);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), skin);
            rArm.position.set(0.4, 1.05, 0);
            
            // Legs
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), pantMat);
            lLeg.position.set(-0.15, 0.35, 0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), pantMat);
            rLeg.position.set(0.15, 0.35, 0);
            
            g.add(head, body, lArm, rArm, lLeg, rLeg);
            // DEBUG SHIELD (Normally hidden)
            const shield = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3, 1.2), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.2 }));
            shield.position.y = 1.5; g.add(shield);
            return g;
        }

        function createFerryman() {
            const colors = [0x795548]; // Brown/Ferryman theme
            const diffColor = colors[0];
            const g = new THREE.Group();
            const skin = new THREE.MeshStandardMaterial({ color: 0xdbac82 });
            const shirtMat = new THREE.MeshStandardMaterial({ color: diffColor });
            const pantMat = new THREE.MeshStandardMaterial({ color: 0x212121 });
            const hatMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skin); head.position.y = 1.65;
            const hat = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.1, 0.65), hatMat); hat.position.y = 1.95;
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.3), shirtMat); body.position.y = 1.05;
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), skin); lArm.position.set(-0.4, 1.05, 0);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), skin); rArm.position.set(0.4, 1.05, 0);
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), pantMat); lLeg.position.set(-0.15, 0.35, 0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), pantMat); rLeg.position.set(0.15, 0.35, 0);
            
            g.add(head, hat, body, lArm, rArm, lLeg, rLeg);
            const shield = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3, 1.2), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.2 }));
            shield.position.y = 1.5; g.add(shield);
            return g;
        }

        function createFoxNPC(difficulty = 1) {
            const colors = [0x44ff44, 0xffff44, 0xff4444];
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: colors[difficulty-1] });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 }); // Nose/Eyes/Tail tip
            
            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.8), mat);
            body.position.y = 0.4;
            
            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
            head.position.set(0, 0.65, 0.4);
            const snout = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), mat);
            snout.position.set(0, 0.6, 0.7);
            
            // Tail
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.5), mat);
            tail.position.set(0, 0.5, -0.55);
            tail.rotation.x = -0.3;
            
            // Legs (4)
            const legSize = 0.15;
            for(let x = -0.1; x <= 0.1; x += 0.2) {
                for(let z = -0.25; z <= 0.25; z += 0.5) {
                    const l = new THREE.Mesh(new THREE.BoxGeometry(legSize, 0.3, legSize), mat);
                    l.position.set(x, 0.15, z);
                    g.add(l);
                }
            }
            
            g.add(body, head, snout, tail);
            // DEBUG SHIELD (Normally hidden)
            const shield = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.5), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.2 }));
            shield.position.y = 1; g.add(shield);
            return g;
        }

        function createSlimeEnemy() {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, transparent: true, opacity: 0.9 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x1b5e20 });
            
            // Creeper Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.9, 0.3), mat);
            body.position.y = 0.75;
            
            // Creeper Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), mat);
            head.position.y = 1.5;
            
            // Creeper Legs (4)
            const legSize = 0.25;
            for(let x = -0.15; x <= 0.15; x += 0.3) {
                for(let z = -0.15; z <= 0.15; z += 0.3) {
                    const l = new THREE.Mesh(new THREE.BoxGeometry(legSize, 0.3, legSize), darkMat);
                    l.position.set(x, 0.15, z);
                    g.add(l);
                }
            }
            
            g.add(body, head);
            g.userData = { type: 'enemy' };
            // Ensure child meshes also have the userData for raycasting/collision if needed
            body.userData = { type: 'enemy' };
            head.userData = { type: 'enemy' };
            return g;
        }

        function createTree() {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8), trunkMat);
            trunk.position.y = 0.75;
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1, 2, 8), leavesMat);
            leaves.position.y = 2.2;
            group.add(trunk, leaves);
            return group;
        }

        function createGhostEnemy() {
            const g = new THREE.Group();
            const ghostMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.8, 8), ghostMat);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), ghostMat);
            head.position.y = 0.4; body.position.y = 0;
            const bodyGroup = new THREE.Group();
            bodyGroup.add(body, head);
            bodyGroup.userData = { type: 'enemy' };
            g.add(bodyGroup);
            g.position.y = 1.6;
            return g;
        }

        function createBoat() {
            const group = new THREE.Group();
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
            const darkWoodMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
            
            // Much Wider Hull segments
            for(let i = 0; i < 5; i++) {
                const s = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 4.5 - (Math.abs(i-2) * 1.0)), woodMat);
                s.position.set(i - 2, 0, 0);
                group.add(s);
            }
            
            // Prow and Stern
            const prow = new THREE.Mesh(new THREE.ConeGeometry(2.0, 1.2, 4), woodMat);
            prow.rotation.z = -Math.PI/2; prow.position.set(2.8, 0.2, 0); prow.scale.set(1, 1, 0.8);
            const stern = new THREE.Mesh(new THREE.ConeGeometry(2.0, 1.0, 4), woodMat);
            stern.rotation.z = Math.PI/2; stern.position.set(-2.6, 0.1, 0); stern.scale.set(1, 1, 0.8);
            group.add(prow, stern);

            // Floor (Walkable)
            const floor = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 3.5), woodMat);
            floor.position.y = 0.3;
            group.add(floor);

            // Mast
            const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 3.5, 8), darkWoodMat);
            mast.position.y = 1.7;
            const cross = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3, 8), darkWoodMat);
            cross.rotation.z = Math.PI/2; cross.position.y = 2.8;
            group.add(mast, cross);

            group.position.y = 0.2;
            return group;
        }

        // --- MAZE ENGINE ---
        function generateMaze() {
            let maze = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(1));
            function carve(x, y) {
                maze[y][x] = 0;
                let dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < GRID_SIZE - 1 && ny > 0 && ny < GRID_SIZE - 1 && maze[ny][nx] === 1) {
                        maze[y + dy / 2][x + dx / 2] = 0; carve(nx, ny);
                    }
                }
            }
            carve(1, 1); return maze;
        }

        function getAccessibleCells(startX, startY, blockX, blockY) {
            let cells = [], queue = [{ x: startX, y: startY }], vis = new Set([`${startX},${startY}`]);
            while (queue.length > 0) {
                let curr = queue.shift(); cells.push(curr);
                [[0, 1], [0, -1], [1, 0], [-1, 0]].forEach(([dx, dy]) => {
                    let nx = curr.x + dx, ny = curr.y + dy;
                    if (nx > 0 && nx < GRID_SIZE && ny > 0 && ny < GRID_SIZE && mazeData[ny][nx] === 0 && !vis.has(`${nx},${ny}`) && !(nx === blockX && ny === blockY)) {
                        vis.add(`${nx},${ny}`); queue.push({ x: nx, y: ny });
                    }
                });
            }
            return cells;
        }

        function startLevel() {
            isDead = false;
            document.getElementById('death-overlay').style.opacity = 0;
            document.getElementById('death-overlay').style.background = 'rgba(180, 0, 0, 0)';
            document.getElementById('death-text').style.transform = 'scale(0.5)';
            // ... (rest as before)
            // Clean up old scene
            entities.forEach(e => scene.remove(e));
            collidables.forEach(w => scene.remove(w));
            enemies.forEach(e => scene.remove(e));
            interactables = []; entities = []; collidables = []; enemies = [];
            inventory = []; discoveredItems = [];
            explored = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));

            mazeData = generateMaze();
            const occupied = new Set(["1,1"]);

            // Critical Path Calculation
            let q = [{ x: 1, y: 1, path: [] }], vis = new Set(["1,1"]), mainPath = [];
            while (q.length > 0) {
                let curr = q.shift();
                if (curr.path.length > mainPath.length) mainPath = curr.path;
                [[0, 1], [0, -1], [1, 0], [-1, 0]].forEach(([dx, dy]) => {
                    let nx = curr.x + dx, ny = curr.y + dy;
                    if (nx > 0 && nx < GRID_SIZE && ny > 0 && ny < GRID_SIZE && mazeData[ny][nx] === 0 && !vis.has(`${nx},${ny}`)) {
                        vis.add(`${nx},${ny}`); q.push({ x: nx, y: ny, path: [...curr.path, { x: nx, y: ny }] });
                    }
                });
            }

            const rDoor = mainPath[Math.floor(mainPath.length * 0.35)];
            const bDoor = mainPath[Math.floor(mainPath.length * 0.75)];
            const trophy = mainPath[mainPath.length - 1];
            occupied.add(`${rDoor.x},${rDoor.y}`);
            occupied.add(`${bDoor.x},${bDoor.y}`);
            occupied.add(`${trophy.x},${trophy.y}`);

            // Build Zones
            const zone1 = getAccessibleCells(1, 1, rDoor.x, rDoor.y);
            const zone2 = getAccessibleCells(rDoor.x, rDoor.y, bDoor.x, bDoor.y);

            // Spawns
            spawnDoor(rDoor.x, rDoor.y, "Red Key", 0xff0000);
            spawnDoor(bDoor.x, bDoor.y, "Blue Key", 0x0000ff);

            const getUnoccupied = (zone) => {
                const filtered = zone.filter(p => !occupied.has(`${p.x},${p.y}`));
                return filtered[Math.floor(Math.random() * filtered.length)];
            };

            if (zone1.length > 0) {
                const rk = getUnoccupied(zone1);
                if (rk) { spawnKeyShop(rk.x, rk.y, "Red Key", 0xff0000); occupied.add(`${rk.x},${rk.y}`); }
                const bs1 = getUnoccupied(zone1);
                if (bs1) { spawnBombShop(bs1.x, bs1.y); occupied.add(`${bs1.x},${bs1.y}`); }
            }
            if (zone2.length > 0) {
                const bk = getUnoccupied(zone2);
                if (bk) { spawnKeyShop(bk.x, bk.y, "Blue Key", 0x0000ff); occupied.add(`${bk.x},${bk.y}`); }
            }

            // Visual World
            const tex = new THREE.TextureLoader();
            const wallHue = (currentLevel * 60) % 360;
            const wallMat = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color(`hsl(${wallHue}, 40%, 40%)`),
                map: tex.load('https://threejs.org/examples/textures/brick_diffuse.jpg') 
            });
            const floorMat = new THREE.MeshStandardMaterial({ map: tex.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg') });

            // Maze Floor & Walls
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const f = new THREE.Mesh(new THREE.PlaneGeometry(CELL, CELL), floorMat);
                    f.rotation.x = -Math.PI / 2; f.position.set(x * CELL, 0, y * CELL);
                    scene.add(f); entities.push(f);

                    if (mazeData[y][x] === 1) {
                        const w = new THREE.Mesh(new THREE.BoxGeometry(CELL, CELL, CELL), wallMat);
                        w.position.set(x * CELL, CELL / 2, y * CELL);
                        w.userData = { type: 'destructible' };
                        scene.add(w); collidables.push(w);
                    }
                }
            }

            // Outside Area & Moat
            const worldSize = 300;
            const mazeCenter = (GRID_SIZE * CELL) / 2 - (CELL / 2);
            const worldPlane = new THREE.Mesh(new THREE.PlaneGeometry(worldSize, worldSize), floorMat);
            worldPlane.rotation.x = -Math.PI / 2; worldPlane.position.set(mazeCenter, -0.05, mazeCenter);
            scene.add(worldPlane); entities.push(worldPlane);

            const moatIn = (GRID_SIZE * CELL) / 2 + 25; // More grass space!
            const moatOut = moatIn + 20;
            waterBounds = { in: moatIn, out: moatOut, center: mazeCenter };

            const waterMat = new THREE.MeshStandardMaterial({ color: 0x0044ff, transparent: true, opacity: 0.7 });
            const waterGeom = new THREE.RingGeometry(moatIn, moatOut, 64);
            const moat = new THREE.Mesh(waterGeom, waterMat);
            moat.rotation.x = -Math.PI / 2; moat.position.set(mazeCenter, 0.1, mazeCenter);
            scene.add(moat); entities.push(moat);

            // Boat
            boatMesh = createBoat();
            boatAngle = Math.random() * Math.PI * 2;
            boatRadius = (moatIn + moatOut) / 2;
            boatState = 'patrol';
            scene.add(boatMesh); entities.push(boatMesh);

            // Ferryman at Moat Edge
            ferrymanAngle = Math.PI * 0.75; // Pre-set angle for the ferryman
            const fx = mazeCenter + Math.cos(ferrymanAngle) * (moatIn - 1.5);
            const fz = mazeCenter + Math.sin(ferrymanAngle) * (moatIn - 1.5);
            const ferryman = createFerryman();
            ferryman.position.set(fx, 0, fz);
            ferryman.rotation.y = -ferrymanAngle + Math.PI;
            ferryman.userData = { type: 'math', difficulty: 2, isFerryman: true };
            scene.add(ferryman); interactables.push(ferryman); entities.push(ferryman);

            // Trees
            for (let i = 0; i < 120; i++) {
                const angle = Math.random() * Math.PI * 2;
                const mazeBox = (GRID_SIZE * CELL) / 2 + 5; // Distance from center to avoid grid
                const distIn = mazeBox + Math.random() * (moatIn - mazeBox - 5);
                const distOut = moatOut + 10 + Math.random() * 60;
                const dist = Math.random() > 0.4 ? distOut : distIn;
                
                const tx = mazeCenter + Math.cos(angle) * dist;
                const tz = mazeCenter + Math.sin(angle) * dist;
                
                // Final safety check: skip if somehow inside the actual maze square
                if (Math.abs(tx - mazeCenter) < mazeBox && Math.abs(tz - mazeCenter) < mazeBox) { i--; continue; }

                const tree = createTree();
                tree.position.set(tx, 0, tz);
                scene.add(tree); entities.push(tree);
            }

            // NPCs
            const allWalkable = [...zone1, ...zone2, ...mainPath];
            allWalkable.forEach(p => {
                const distToSpawn = Math.abs(p.x - 1) + Math.abs(p.y - 1);
                const posKey = `${p.x},${p.y}`;
                if (Math.random() < 0.12 && distToSpawn > 2 && !occupied.has(posKey)) {
                    occupied.add(posKey);
                    const diff = distToSpawn < 8 ? 1 : (distToSpawn < 15 ? 2 : 3);
                    const npc = Math.random() > 0.4 ? createHumanNPC(diff) : createFoxNPC(diff);
                    npc.position.set(p.x * CELL, 0, p.y * CELL);
                    npc.userData = { type: 'math', difficulty: diff };
                    scene.add(npc); interactables.push(npc); entities.push(npc);
                }
            });

            // Enemies (Scaled by level)
            const baseCount1 = currentLevel === 1 ? 1 : (currentLevel === 2 ? 2 : 4);
            const baseCount2 = currentLevel === 1 ? 2 : (currentLevel === 2 ? 4 : 6);
            
            const targetZones = [
                { zone: zone1.length > 0 ? zone1 : mainPath, count: baseCount1 },
                { zone: zone2.length > 0 ? zone2 : mainPath, count: baseCount2 }
            ];

            targetZones.forEach(({ zone, count }) => {
                if (zone.length === 0) return;
                for (let i = 0; i < count; i++) {
                    const p = zone[Math.floor(Math.random() * zone.length)];
                    const distToSpawn = Math.abs(p.x - 1) + Math.abs(p.y - 1);
                    const posKey = `${p.x},${p.y}`;
                    if (distToSpawn < 10 || occupied.has(posKey)) { i--; continue; } 
                    occupied.add(posKey);
                    const enemy = Math.random() > 0.5 ? createSlimeEnemy() : createGhostEnemy();
                    enemy.position.set(p.x * CELL, 0, p.y * CELL);
                    enemy.userData = { type: 'enemy', dir: new THREE.Vector3(1, 0, 0), speed: 0.04 + Math.random() * 0.04 };
                    scene.add(enemy);
                    enemies.push(enemy);
                }
            });
            console.log("Level", currentLevel, "Enemies spawned:", enemies.length);

            const exit = new THREE.Mesh(new THREE.TorusKnotGeometry(0.4, 0.12), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
            exit.position.set(trophy.x * CELL, 1.5, trophy.y * CELL);
            exit.userData = { type: 'exit', color: 0xffd700 };
            const shield = new THREE.Mesh(new THREE.BoxGeometry(1.5, 6, 1.5), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.2 }));
            exit.add(shield);
            scene.add(exit); interactables.push(exit); entities.push(exit);

            camera.position.set(CELL, 2, CELL);
            
            // Dynamic Rotation: Face the first path step
            if (mainPath.length > 0) {
                const firstStep = mainPath[0];
                startRotation = Math.atan2((firstStep.x * CELL) - (1 * CELL), (firstStep.y * CELL) - (1 * CELL));
                camera.rotation.set(0, startRotation + Math.PI, 0); // Corrected facing
            } else {
                camera.rotation.set(0, Math.PI, 0);
            }
            
            updateHUD();
            showMsg("LEVEL " + currentLevel + ": FIND GOLD FOR RED KEY");
        }

        function spawnKeyShop(gx, gy, id, col) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.4 });
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 8), mat); stem.rotation.x = Math.PI/2;
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.04, 8, 16), mat); ring.position.z = 0.35;
            const bit = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.18,0.06), mat); bit.position.set(0.08, 0, -0.28);
            group.add(stem, ring, bit);
            group.position.set(gx * CELL, 1.5, gy * CELL);
            group.userData = { type: 'shop', id, price: KEY_PRICE, color: col };
            const shield = new THREE.Mesh(new THREE.BoxGeometry(1.5, 7, 1.5), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.2 }));
            group.add(shield); scene.add(group); interactables.push(group); entities.push(group);
        }

        function spawnBombShop(gx, gy) {
            const group = new THREE.Group();
            const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            const wick = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.2, 8), new THREE.MeshStandardMaterial({ color: 0x884422 }));
            wick.position.y = 0.45;
            group.add(bomb, wick);
            group.position.set(gx * CELL, 1, gy * CELL);
            group.userData = { type: 'shop', id: 'Bomb', price: BOMB_PRICE, color: 0x333333 };
            const shield = new THREE.Mesh(new THREE.BoxGeometry(1.5, 7, 1.5), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.2 }));
            group.add(shield); scene.add(group); interactables.push(group); entities.push(group);
        }

        function spawnDoor(gx, gy, id, col) {
            const isH = mazeData[gy][gx - 1] === 1 || mazeData[gy][gx + 1] === 1;
            const d = new THREE.Mesh(new THREE.BoxGeometry(CELL * 1.15, CELL, 0.5), new THREE.MeshStandardMaterial({ color: col, transparent: true, opacity: 0.6 }));
            d.position.set(gx * CELL, CELL / 2, gy * CELL);
            if (!isH) d.rotation.y = Math.PI / 2;
            d.userData = { type: 'door', id, color: col };
            scene.add(d); interactables.push(d); collidables.push(d);
        }

        // --- INTERACTION ---
        const keysDown = {};
        window.addEventListener('keydown', e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space", "KeyB"].includes(e.code)) e.preventDefault();
            keysDown[e.code] = true;
            if (e.code === 'Space' && !isMathActive) handleGrab();
            if (e.code === 'KeyB' && !isMathActive) handleBomb();
        });
        window.addEventListener('keyup', e => keysDown[e.code] = false);

        function handleGrab() {
            // DISEMBARK LOGIC (Fixed for SPACE and Refined Distance)
            if (isPlayerOnBoat && atShore && waterBounds) {
                isPlayerOnBoat = false; boatState = 'stopped'; 
                lastDisembark = Date.now(); // Prevent instant re-boarding
                const dir = atShore === 'inner' ? -5 : 5; // Long jump to safety
                const dx = camera.position.x - waterBounds.center;
                const dz = camera.position.z - waterBounds.center;
                const angle = Math.atan2(dz, dx);
                camera.position.x += Math.cos(angle) * dir;
                camera.position.z += Math.sin(angle) * dir;
                showMsg("DISEMBARKED");
                return;
            }

            handGroup.visible = true; handGroup.position.z = -1.8;
            fingers.forEach(f => f.rotation.x = -Math.PI / 3);
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(interactables, true);
            if (hits.length > 0 && hits[0].distance < 2.5) {
                let obj = hits[0].object;
                while (obj.parent && !obj.userData.type) obj = obj.parent;
                if (obj.userData.type) processLogic(obj);
            }
            setTimeout(() => { handGroup.visible = false; handGroup.position.z = -1.2; fingers.forEach(f => f.rotation.x = 0); }, 300);
        }

        function handleBomb() {
            if (bombs <= 0) { showMsg("OUT OF BOMBS!"); return; }
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(collidables);
            if (hits.length > 0 && hits[0].distance < 6) {
                const wall = hits[0].object;
                if (wall.userData.type === 'destructible') {
                    bombs--; updateHUD();
                    const b = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                    b.position.copy(hits[0].point); scene.add(b);
                    setTimeout(() => {
                        scene.remove(b); scene.remove(wall);
                        collidables = collidables.filter(w => w !== wall);
                        showMsg("BOOM!");
                    }, 1500);
                }
            }
        }

        function processLogic(obj) {
            const d = obj.userData;
            if (d.type === 'exit') {
                sfx.levelUp();
                currentLevel++; lives++; showMsg("SUCCESS! LEVEL " + currentLevel);
                setTimeout(startLevel, 1500);
            } else if (d.type === 'math') {
                isMathActive = true;
                const diff = d.difficulty || 1;
                let a, b, ans, op = 'x';
                
                if (currentLevel === 1) {
                    const isAdd = Math.random() > 0.5;
                    a = Math.floor(Math.random() * 10) + 1;
                    b = Math.floor(Math.random() * 10) + 1;
                    if (!isAdd && a < b) [a, b] = [b, a]; // No negative results
                    op = isAdd ? '+' : '-';
                    ans = isAdd ? a + b : a - b;
                } else if (currentLevel === 2) {
                    a = Math.floor(Math.random() * 6);
                    b = Math.floor(Math.random() * 6);
                    ans = a * b;
                } else {
                    const range = diff * 8;
                    a = Math.floor(Math.random() * range) + 2;
                    b = Math.floor(Math.random() * range) + 2;
                    ans = a * b;
                }

                const reward = (20 * currentLevel) + (diff * 15);
                document.getElementById('math-problem').innerText = `${a} ${op} ${b} = ?`;
                document.getElementById('math-ui').style.display = 'flex';
                const input = document.getElementById('math-input');
                input.value = ''; input.focus();
                const check = (e) => {
                    if (e.key === 'Enter') {
                        if (parseInt(input.value) === ans) {
                            gold += reward; showMsg("CORRECT! +" + reward + " GOLD"); sfx.win();
                            if (obj.userData.isFerryman) {
                                boatState = 'drifting';
                                showMsg("FERRYMAN SUMMONS THE BOAT!");
                            } else {
                                scene.remove(obj); interactables = interactables.filter(i => i !== obj);
                            }
                        } else { 
                            sfx.fail(); 
                            handleDeath("WRONG! -1 LIFE");
                        }
                        isMathActive = false; document.getElementById('math-ui').style.display = 'none';
                        updateHUD(); window.removeEventListener('keydown', check);
                    }
                };
                window.addEventListener('keydown', check);
            } else if (d.type === 'shop') {
                if (gold >= d.price) {
                    gold -= d.price; sfx.buy();
                    if (d.id === 'Bomb') bombs++; else inventory.push(d.id);
                    if (d.id !== 'Bomb') { scene.remove(obj); interactables = interactables.filter(i => i !== obj); }
                    showMsg("PURCHASED " + d.id); updateHUD();
                } else showMsg("NEED " + (d.price - gold) + " MORE GOLD!");
            } else if (d.type === 'door') {
                if (inventory.includes(d.id)) {
                    scene.remove(obj); collidables = collidables.filter(w => w !== obj);
                    showMsg("UNLOCKED!");
                } else showMsg("NEED THE " + d.id);
            }
        }

        // --- MAP & LOOP ---
        window.toggleMap = () => {
            const m = document.getElementById('map-overlay');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
            if (m.style.display === 'block') drawMap();
        };

        window.startGame = () => {
            console.log("Game Starting...");
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('landing-page').style.display = 'none';
            if (!isGameStarted) {
                isGameStarted = true;
                startLevel();
                animate();
            } else {
                gold = 0; lives = 3; bombs = 1; currentLevel = 1; inventory = [];
                updateHUD(); startLevel();
            }
        };

        function handleDeath(msg = "TOUCHED ENEMY! -1 LIFE") {
            if (isDead) return;
            isDead = true; isPlayerOnBoat = false; 
            lives--; updateHUD();
            showMsg(msg);
            sfx.hurt();
            
            const overlay = document.getElementById('death-overlay');
            const txt = document.getElementById('death-text');
            overlay.style.opacity = 1;
            overlay.style.background = 'rgba(180, 0, 0, 0.7)';
            txt.style.transform = 'scale(1.5)';

            setTimeout(() => {
                if (lives <= 0) {
                    document.getElementById('landing-page').style.display = 'flex';
                    overlay.style.opacity = 0;
                    txt.style.transform = 'scale(0.5)';
                    isDead = false;
                } else {
                    camera.position.set(CELL, 2, CELL);
                    camera.rotation.set(0, startRotation + Math.PI, 0); 
                    isDead = false;
                    overlay.style.opacity = 0;
                    overlay.style.background = 'rgba(180, 0, 0, 0)';
                    txt.style.transform = 'scale(0.5)';
                }
            }, 2500);
        }

        function drawMap() {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            const s = canvas.width / GRID_SIZE;
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 300, 300);
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (explored[y][x]) {
                        const isWall = collidables.some(w => Math.round(w.position.x / CELL) === x && Math.round(w.position.z / CELL) === y);
                        ctx.fillStyle = isWall ? "#444" : "#fff";
                        ctx.fillRect(x * s, y * s, s, s);
                    }
                }
            }
            const px = (camera.position.x / CELL) * s, py = (camera.position.z / CELL) * s, ang = camera.rotation.y;
            ctx.save(); ctx.translate(px, py); ctx.rotate(ang); ctx.fillStyle = "red";
            ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(-s / 1.5, s / 1.5); ctx.lineTo(s / 1.5, s / 1.5); ctx.fill(); ctx.restore();
        }

        function updateHUD() {
            document.getElementById('gold-val').innerText = gold;
            document.getElementById('lives-val').innerText = lives;
            document.getElementById('bomb-val').innerText = bombs;
            document.getElementById('lvl-val').innerText = currentLevel;
            document.getElementById('keys-val').innerText = inventory.length ? inventory.join(", ") : "None";
        }

        function showMsg(t) {
            const m = document.getElementById('msg'); m.innerText = t;
            setTimeout(() => { if (m.innerText === t) m.innerText = ""; }, 2500);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isMathActive) {
                if (isDead) {
                    camera.rotation.z += 0.01;
                    camera.position.y -= 0.01;
                } else {
                    const old = camera.position.clone();
                    // Disable normal walking if on boat to prevent falling off
                    if (!isPlayerOnBoat) {
                        if (keysDown['ArrowUp'] || keysDown['KeyW']) camera.translateZ(-0.13);
                        if (keysDown['ArrowDown'] || keysDown['KeyS']) camera.translateZ(0.13);
                        if (keysDown['ArrowLeft'] || keysDown['KeyA']) camera.rotation.y += 0.045;
                        if (keysDown['ArrowRight'] || keysDown['KeyD']) camera.rotation.y -= 0.045;
                    }

                    const playerBB = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1.2, 1, 1.2));
                    for (let w of collidables) {
                        if (playerBB.intersectsBox(new THREE.Box3().setFromObject(w))) { camera.position.copy(old); break; }
                    }

                    enemies.forEach(en => {
                        const d = en.userData;
                        en.position.add(d.dir.clone().multiplyScalar(d.speed));
                        const enBB = new THREE.Box3().setFromCenterAndSize(en.position, new THREE.Vector3(1, 1, 1));
                        
                        // --- PLAYER COLLISION CHECK ---
                        const pPos = new THREE.Vector2(camera.position.x, camera.position.z);
                        const ePos = new THREE.Vector2(en.position.x, en.position.z);
                        const distXZ = pPos.distanceTo(ePos);
                        
                        if (Date.now() - lastHit > 1000 && (distXZ < 1.8 || playerBB.intersectsBox(enBB))) {
                            lastHit = Date.now();
                            handleDeath("TOUCHED ENEMY! -1 LIFE");
                        }

                        // Enemy wall bounce
                        let hit = false;
                        for (let w of collidables) {
                            if (enBB.intersectsBox(new THREE.Box3().setFromObject(w))) { hit = true; break; }
                        }
                        if (hit) {
                            en.position.sub(d.dir.clone().multiplyScalar(d.speed));
                            const dirs = [new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0), new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1)];
                            d.dir = dirs[Math.floor(Math.random() * dirs.length)];
                        }
                    });

                    const gx = Math.round(camera.position.x / CELL), gy = Math.round(camera.position.z / CELL);
                    if (gx >= 0 && gx < GRID_SIZE && gy >= 0 && gy < GRID_SIZE) {
                        explored[gy][gx] = true;
                    }

                    // --- MOAT CHECK ---
                    if (waterBounds && Date.now() - lastHit > 1000 && !isPlayerOnBoat) {
                        const dx = camera.position.x - waterBounds.center;
                        const dz = camera.position.z - waterBounds.center;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if (dist > waterBounds.in && dist < waterBounds.out) {
                            lastHit = Date.now();
                            handleDeath("FELL IN THE MOAT! -1 LIFE");
                        }
                    }
                }
            }

            // Boat Animation & Movement
            if (boatMesh && waterBounds) {
                const oldBoatX = boatMesh.position.x;
                const oldBoatZ = boatMesh.position.z;

                if (boatState === 'patrol') {
                    boatAngle += 0.0007;
                } else if (boatState === 'drifting') {
                    let diff = (ferrymanAngle - boatAngle) % (Math.PI * 2);
                    if (diff < -Math.PI) diff += Math.PI * 2;
                    if (diff > Math.PI) diff -= Math.PI * 2;
                    if (Math.abs(diff) < 0.01) {
                        boatState = 'stopped';
                        boatRadius = waterBounds.in + 1.2;
                        showMsg("THE BOAT HAS ARRIVED! BOARD TO SAIL.");
                    } else {
                        boatAngle += Math.sign(diff) * 0.005;
                    }
                }

                // Sailing Input
                if (isPlayerOnBoat) {
                    if (keysDown['ArrowLeft'] || keysDown['KeyA']) boatAngle -= 0.01;
                    if (keysDown['ArrowRight'] || keysDown['KeyD']) boatAngle += 0.01;
                    if (keysDown['ArrowUp'] || keysDown['KeyW']) boatRadius += 0.2;
                    if (keysDown['ArrowDown'] || keysDown['KeyS']) boatRadius -= 0.2;
                    
                    boatRadius = Math.max(waterBounds.in + 1.2, Math.min(waterBounds.out - 1.2, boatRadius));
                    
                    atShore = null;
                    if (boatRadius > waterBounds.out - 2.8) { showMsg("OUTER SHORE - SPACE TO EXIT"); atShore = 'outer'; }
                    if (boatRadius < waterBounds.in + 2.8) { showMsg("INNER SHORE - SPACE TO EXIT"); atShore = 'inner'; }
                }
                
                // Position boat
                boatMesh.position.x = waterBounds.center + Math.cos(boatAngle) * boatRadius;
                boatMesh.position.z = waterBounds.center + Math.sin(boatAngle) * boatRadius;
                boatMesh.rotation.y = -boatAngle + Math.PI/2;
                boatMesh.position.y = 0.15 + (Math.sin(Date.now() * 0.001) * 0.06); 

                // Carrier logic
                const pXZ = new THREE.Vector2(camera.position.x, camera.position.z);
                const bXZ = new THREE.Vector2(boatMesh.position.x, boatMesh.position.z);
                const distToBoat = pXZ.distanceTo(bXZ);

                if (!isPlayerOnBoat) {
                    if ((boatState === 'stopped' || boatState === 'sailing') && distToBoat < 4.0 && Date.now() - lastDisembark > 2000) {
                        isPlayerOnBoat = true; boatState = 'sailing'; 
                        camera.position.x = boatMesh.position.x;
                        camera.position.z = boatMesh.position.z;
                    }
                } else {
                    camera.position.x += (boatMesh.position.x - oldBoatX);
                    camera.position.z += (boatMesh.position.z - oldBoatZ);
                }
            }

            entities.forEach(i => { if (i.userData.type === 'exit') i.rotation.y += 0.05; });
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
